name: Auto-inbox — propose

# Fires when Supabase posts a repository_dispatch event of type 'inbox-new'
# after a new row lands in claude_requests. The Claude agent reads the row,
# drafts a plan, classifies tier (trivial/ambiguous/non_trivial), and either
# executes+ships (TRIVIAL) or writes a proposal and flips status to
# 'proposed' (AMBIGUOUS/NON_TRIVIAL) for user approval in the CONFIG tab.

on:
  repository_dispatch:
    types: [inbox-new]
  workflow_dispatch:
    inputs:
      request_id:
        description: 'claude_requests.id to process'
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: inbox-${{ github.event.client_payload.request_id || inputs.request_id }}
  cancel-in-progress: false

jobs:
  propose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name  "maestro-inbox-bot"
          git config user.email "bot@maestro.local"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Follow the runbook at .github/prompts/inbox-propose.md exactly,
            step by step. The claude_requests row id is in the $REQUEST_ID
            environment variable.
          claude_args: |
            --allowedTools "Read,Write,Edit,Grep,Glob,Bash"
        env:
          REQUEST_ID: ${{ github.event.client_payload.request_id || inputs.request_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COMMIT_SHA_ENV: ${{ github.sha }}

      - name: Record failure on Claude action error
        if: failure()
        env:
          REQUEST_ID: ${{ github.event.client_payload.request_id || inputs.request_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/inbox-update.mjs "$REQUEST_ID" failed "Propose step errored — see workflow run ${{ github.run_id }}"
